version: '3.9'

services:
  debate-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: debate-bot-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
    volumes:
      # Mount source code for development
      - .:/app
      # Exclude Python cache directories
      - /app/__pycache__
      - /app/.pytest_cache
    command: python -m uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - debate-network

networks:
  debate-network:
    driver: bridge
